    consumes:
      - ontology
      - claim
      - evidence
      - gap
    emits:
      - claim
      - evidence
      - gap
    relationships:
      - verifies
      - gapped_by
    actions:
      - canonical_reload
      - prove_bind
    source_refs:
      - src.fail.repo
    authority_state: repo_observed
    approval_state: not_required
    confidence: 1
canonical_reload:
  action_type: canonical_reload
  required_before:
    - validate
    - dashboard
    - proof_report
  preserves_human_fields: true
  description: Canonical .seal YAML is reloaded before validation and reporting.
  source_refs:
    - src.fail.repo
  authority_state: repo_observed
  approval_state: not_required
  confidence: 1
