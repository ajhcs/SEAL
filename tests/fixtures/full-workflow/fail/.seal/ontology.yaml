command_bindings:
  - command: map
    consumes:
      - source
      - ontology
    emits:
      - component
      - file
      - gap
    relationships:
      - implements
      - observed_in
    actions:
      - canonical_reload
      - map_emit
    source_refs:
      - src.fail.repo
    authority_state: repo_observed
