results: []
actions:
  - id: action.generated-reload-canonical
    action_type: reload_canonical
    summary: Reload canonical .seal YAML before recording validation, generated views, or closure state.
    actor: seal.fly
    subject_refs:
      - .seal/ontology.yaml
      - .seal/map.yaml
      - .seal/proof.yaml
    artifact_refs:
      - .seal/ontology.yaml
      - .seal/map.yaml
      - .seal/proof.yaml
    audit_refs: []
    source_refs:
      - src.repo-seal
    authority_state: repo_observed
    approval_state: pending
    confidence: 0.8
  - id: action.generated-validate
    action_type: validate
    summary: Validate persisted canonical artifacts after reload.
    actor: seal.validate
    subject_refs:
      - .seal/ontology.yaml
      - .seal/map.yaml
      - .seal/proof.yaml
    artifact_refs:
      - .seal/ontology.yaml
      - .seal/map.yaml
      - .seal/proof.yaml
    audit_refs: []
    source_refs:
      - src.repo-seal
    authority_state: repo_observed
    approval_state: pending
    confidence: 0.8
  - id: action.generated-view
    action_type: generate_view
    summary: Generate derived non-authoritative readiness views from canonical records.
    actor: seal.fly
    subject_refs:
      - FLY-generated
    artifact_refs:
      - .seal/reports/launch-readiness.md
    audit_refs: []
    source_refs:
      - src.repo-seal
    authority_state: repo_observed
    approval_state: pending
    confidence: 0.8
  - id: action.generated-fly-record
    action_type: fly_record
    summary: Record the FLY cycle as canonical learning input.
    actor: seal.fly
    subject_refs:
      - FLY-generated
    artifact_refs:
      - .seal/fly/FLY-generated.yaml
    audit_refs: []
    source_refs:
      - src.repo-seal
    authority_state: repo_observed
    approval_state: pending
    confidence: 0.8
state_transitions:
  - id: transition.generated-proof-gap-open
    state_type: gap_state
    subject_ref: gap.generated-proof-evidence
    from_state: open
    to_state: open
    action_ref: action.generated-fly-record
    summary: Generated proof gap remains open until validation evidence is attached.
    source_refs:
      - src.repo-seal
    authority_state: repo_observed
    approval_state: pending
    confidence: 0.8
  - id: transition.generated-artifact-validated
    state_type: artifact_state
    subject_ref: .seal/ontology.yaml
    from_state: draft
    to_state: observed
    action_ref: action.generated-validate
    summary: Canonical artifact is observed from disk before validation is trusted.
    source_refs:
      - src.repo-seal
    authority_state: repo_observed
    approval_state: pending
    confidence: 0.8
learning:
  plan_updates_required: []
  map_updates_required: []
  proof_updates_required:
    - id: learn.generated-proof-gap
      summary: Close or explicitly carry forward gap.generated-proof-evidence.
      source_refs:
        - src.repo-seal
      authority_state: repo_observed
      approval_state: pending
      confidence: 0.8
      ref: gap.generated-proof-evidence
  new_unknowns: []
  retired_assumptions: []
  new_debt: []
  next_fly_cycle: []
source_refs:
  - src.repo-seal
authority_state: repo_observed
approval_state: pending
confidence: 0.6
