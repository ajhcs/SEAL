bead_id: seal-artifact-index
acceptance_criteria:
  - Generated index includes compact artifact metadata, hashes, byte counts, relation records, source references, and resolver hints.
  - Resolver utilities load records by ID, path, relation, and affected target.
  - Validation fails stale hashes, missing hashes, missing artifacts, and dangling relation references.
  - Context packs use index references and avoid full canonical artifact dumps by default.
  - The index remains a generated non-authoritative projection over disk canonical artifacts.
implementation_summary: Added the derived artifact index builder, resolver helpers, stale/broken index validation, context-pack index references, canonical repository coverage, docs, and focused tests that keep index data compact and non-authoritative.
